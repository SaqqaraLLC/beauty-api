<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#0A0A0A; font-family:Arial, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0A0A0A;">
    <tr><td align="center" style="padding:40px 0;">
      <img src="https://saqqarallc.com/branding/saqqara-logo-flat.svg" width="160" alt="Saqqara LLC" style="display:block;" />
    </td></tr>
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="background:#111; border-radius:8px; padding:40px;">
        <tr><td style="color:#eee; font-size:28px; font-family:Cinzel, serif; text-align:center; padding-bottom:20px;">
          Welcome to the Team
        </td></tr>
        <tr><td style="color:#eee; font-size:16px; line-height:26px; padding-bottom:24px;">
          Hi {{FullName}},<br><br>
          You've been added to the Saqqara team platform. Set your password below to access your account.
        </td></tr>
        <tr><td align="center" style="padding-bottom:32px;">
          <a href="{{ResetLink}}"
            style="display:inline-block; background:#C9A227; color:#000; font-family:Cinzel, serif; font-size:14px; font-weight:bold; text-decoration:none; padding:14px 36px; border-radius:6px; letter-spacing:0.08em;">
            Set My Password
          </a>
        </td></tr>
        <tr><td style="color:#888; font-size:13px; line-height:22px; padding-bottom:24px;">
          This link expires in 24 hours. If you did not expect this email, contact
          <a href="mailto:support@saqqarallc.com" style="color:#C9A227;">support@saqqarallc.com</a>.
        </td></tr>
      </table>
    </td></tr>
    <tr><td align="center" style="color:#555; font-size:12px; padding:20px;">
      &copy; {{Year}} Saqqara LLC &mdash; saqqarallc.com
    </td></tr>
  </table>
</body>
</html>
